<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stundenplan Personal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Personalverteilung</h1>
        <p class="version">Version: 0.0.4</p>
        
        <!-- Upload Bereich für CSV-Datei -->
        <div class="upload-area" id="uploadArea">
            <p class="upload-instructions">Ziehen Sie eine CSV-Datei hierher oder klicken Sie zum Hochladen</p>
            <button class="upload-button" onclick="document.getElementById('fileInput').click()">CSV-Datei auswählen</button>
            <input type="file" id="fileInput" accept=".csv" onchange="handleFileUpload(event)">
            <p class="file-info" id="fileInfo">Keine Datei ausgewählt</p>
        </div>
        
        <div class="table-container">
            <table id="personalTable">
                <thead id="tableHeader">
                    <tr></tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Dynamisch generiert -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
